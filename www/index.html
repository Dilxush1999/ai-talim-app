<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Ta'lim</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- SPLASH SCREEN -->
    <div id="splash-screen" class="screen active">
        <div class="splash-logo-wrap">
            <div class="splash-glow"></div>
            <img src="img/logo.png" alt="AI Ta'lim" class="splash-logo">
        </div>
        <h1 class="splash-title">AI Ta'lim</h1>
        <p class="splash-subtitle">Zamonaviy onlayn ta'lim platformasi</p>
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <span class="loading-text">Ma'lumotlar yuklanmoqda...</span>
        </div>
    </div>

    <!-- NO INTERNET SCREEN -->
    <div id="no-internet-screen" class="screen error-screen">
        <div class="error-icon-wrap">
            <div class="error-icon no-wifi">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
                    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
                    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                    <line x1="12" y1="20" x2="12.01" y2="20"></line>
                </svg>
            </div>
        </div>
        <h2 class="error-title">Internet aloqasi mavjud emas</h2>
        <button class="btn btn-primary" onclick="retryConnection()">
            🔄 Qayta urinish
        </button>
    </div>

    <script src="cordova.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
